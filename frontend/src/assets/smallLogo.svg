<svg width="64" height="64" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  
  <defs>
    <style>
      .navy { fill: #001051; }
      .navy-stroke { stroke: #001051; }
      .blue { fill: #2563EB; }
      .font-main { font-family: 'Poppins', Arial, sans-serif; }
    </style>
  </defs>

  <!-- LEFT SIDE: EMBLEM -->
  <g transform="translate(10, 5)">
    <!-- Gear Effect (Outer Ring) -->
    <circle cx="100" cy="100" r="85" fill="none" class="navy-stroke" stroke-width="12" stroke-dasharray="16 10.5" />
    <circle cx="100" cy="100" r="76" fill="none" class="navy-stroke" stroke-width="4" />
    
    <!-- White Inner Background -->
    <circle cx="100" cy="100" r="74" fill="white" />

    <!-- Sanskrit & Year Text Paths -->
    <path id="topCurve" d="M 40 100 A 60 60 0 0 1 160 100" fill="none" />
    <text class="navy font-main" font-size="12" font-weight="bold">
      <textPath href="#topCurve" startOffset="50%" text-anchor="middle">योगः कर्मसु कौशलम्</textPath>
    </text>
    
    <path id="bottomCurve" d="M 50 110 A 50 50 0 0 0 150 110" fill="none" />
    <text class="navy font-main" font-size="10" font-weight="bold">
      <textPath href="#bottomCurve" startOffset="50%" text-anchor="middle">- 1951 -</textPath>
    </text>

    <!-- Stylized Tower Building -->
    <g class="navy">
      <!-- Base -->
      <rect x="40" y="140" width="120" height="8" />
      <rect x="50" y="132" width="100" height="8" />
      <!-- Side Pillars -->
      <rect x="55" y="110" width="6" height="22" />
      <rect x="139" y="110" width="6" height="22" />
      <!-- Main Tower -->
      <rect x="85" y="70" width="30" height="62" />
      <!-- Tower Dome / Top -->
      <polygon points="80,60 100,35 120,60" />
      <!-- Tower Windows -->
      <rect x="95" y="70" width="10" height="15" fill="white" />
      <rect x="95" y="105" width="10" height="25" fill="white" />
    </g>
  </g>
</svg>
